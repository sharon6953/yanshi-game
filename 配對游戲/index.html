<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕子詩配對遊戲</title>
    <style>
        body {
            background: #fdf6e3 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23fdf6e3"/><path d="M0,50 Q25,40 50,50 T100,50 L100,100 L0,100 Z" fill="%23f0e6d2" opacity="0.3"/></svg>') repeat;
            font-family: "Microsoft YaHei", "SimSun", serif;
            color: #5c4033;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        #top {
            text-align: center;
            margin: 30px 0;
            font-size: 18px;
        }
        button {
            padding: 12px 30px;
            font-size: 20px;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(139,69,19,0.3);
            margin: 0 20px;
        }
        button:hover { background: #A0522D; }
        #timer {
            font-size: 28px;
            font-weight: bold;
            color: #8B4513;
        }
        #images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 960px;
            margin: 0 auto 40px;
        }
        .image-slot {
            position: relative;
            border: 3px solid #8B4513;
            border-radius: 12px;
            padding: 15px;
            background: #fffaf0;
            box-shadow: 0 6px 12px rgba(139,69,19,0.2);
            min-height: 220px;
        }
        .image-slot img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
        .feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        #poems {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 960px;
            margin: 0 auto;
        }
        .poem-box {
            width: 280px;
            min-height: 110px;
            background: #fffaf0;
            border: 2px solid #8B4513;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: move;
            box-shadow: 0 4px 8px rgba(139,69,19,0.2);
            font-size: 15px;
            line-height: 1.5;
            transition: all 0.2s;
        }
        .poem-box:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(139,69,19,0.3); }
        .poem-box.dragging { opacity: 0.6; transform: rotate(5deg); }
        .try-again {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0000;
            font-weight: bold;
            font-size: 16px;
            background: rgba(255,255,255,0.8);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="top">
        <button id="start">開始遊戲</button>
        <span id="timer">00:00</span>
    </div>
    <div id="images"></div>
    <div id="poems"></div>

    <script>
        const poems = [
            "銜泥兩椽間，一巢生四兒。",
            "青蟲不易捕，黃口無飽期。",
            "喃喃教言語，一一刷毛衣。",
            "舉翅不回顧，隨風四散飛。",
            "卻入空巢裏，啁啾終夜悲。",
            "思爾為雛日，高飛背母時。"
        ];
        const imageFiles = ['燕1.png', '燕2.png', '燕3.png', '燕4.png', '燕5.png', '燕6.png']; // 對應詩句1-6
        let shuffledIndices = [];
        let matched = new Set();
        let startTime, timerInterval;
        let draggedIndex = null;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            const imagesDiv = document.getElementById('images');
            imagesDiv.innerHTML = '';
            const indices = [0,1,2,3,4,5];
            shuffledIndices = shuffle(indices);
            shuffledIndices.forEach(idx => {
                const slot = document.createElement('div');
                slot.className = 'image-slot';
                slot.dataset.correct = idx;
                slot.innerHTML = `<img src="${imageFiles[idx]}" alt="燕${idx+1}"> <div class="feedback"></div>`;
                slot.addEventListener('dragover', e => e.preventDefault());
                slot.addEventListener('drop', handleDrop);
                imagesDiv.appendChild(slot);
            });

            const poemsDiv = document.getElementById('poems');
            poemsDiv.innerHTML = '';
            poems.forEach((text, i) => {
                const box = document.createElement('div');
                box.className = 'poem-box';
                box.dataset.poem = i;
                box.textContent = text;
                box.draggable = true;
                box.addEventListener('dragstart', e => {
                    draggedIndex = i;
                    box.classList.add('dragging');
                });
                box.addEventListener('dragend', () => box.classList.remove('dragging'));
                poemsDiv.appendChild(box);
            });

            matched.clear();
            document.querySelectorAll('.feedback').forEach(f => f.textContent = '');
            document.querySelectorAll('.try-again').forEach(t => t.remove());
        }

        function handleDrop(e) {
            e.preventDefault();
            const slot = e.currentTarget;
            const correct = parseInt(slot.dataset.correct);
            const feedback = slot.querySelector('.feedback');
            if (draggedIndex === correct) {
                feedback.textContent = '√';
                feedback.style.color = '#228B22';
                matched.add(correct);
                const poemBox = document.querySelector(`.poem-box[data-poem="${draggedIndex}"]`);
                if (poemBox) poemBox.style.visibility = 'hidden';
                if (matched.size === 6) {
                    clearInterval(timerInterval);
                    setTimeout(() => alert('恭喜完成配對！用時 ' + document.getElementById('timer').textContent), 500);
                }
            } else {
                feedback.textContent = '×';
                feedback.style.color = '#ff0000';
                const tryMsg = document.createElement('div');
                tryMsg.className = 'try-again';
                tryMsg.textContent = '再嘗試一下';
                slot.appendChild(tryMsg);
                setTimeout(() => {
                    feedback.textContent = '';
                    tryMsg.remove();
                }, 2500);
            }
            draggedIndex = null;
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const sec = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${min}:${sec}`;
            }, 1000);
        }

        document.getElementById('start').addEventListener('click', () => {
            initGame();
            clearInterval(timerInterval);
            document.getElementById('timer').textContent = '00:00';
            startTimer();
        });
    </script>
</body>
</html>
